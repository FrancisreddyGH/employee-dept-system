spring.application.name=employeedept

spring.datasource.url=jdbc:mysql://localhost:3306/employeedept?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=abcd

spring.datasource.initialization-mode=always
spring.sql.init.mode=always

spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.format_sql=true

# Fix: run data.sql AFTER Hibernate creates the tables
spring.jpa.defer-datasource-initialization=true

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.mvc.static-path-pattern=/static/**
spring.web.resources.static-locations=classpath:/static/,file:src/main/webapp/static/